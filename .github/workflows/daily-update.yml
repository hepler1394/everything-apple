name: "Daily Apple news + sideload/jailbreak update"

on:
  schedule:
    # Once daily at ~11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest news
        run: node scripts/fetch-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "everything-apple-bot"
          git config user.email "actions@users.noreply.github.com"
          git add client/public/data/news.json
          git diff --staged --quiet || git commit -m "chore: daily news refresh [skip ci]"
          git push
